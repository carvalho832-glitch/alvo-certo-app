<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Ofertas Rastreadas</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Alvo Certo">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #219653; }
        .resultado { margin-top: 20px; padding: 15px; background-color: #e8f8f5; border: 1px solid #a3e4d7; border-radius: 4px; display: none; }
        .resultado p { color: #117a65; font-weight: bold; }
        .resultado input { margin-top: 10px; text-align: center; background: #fff; font-weight: bold; color: #27ae60; }
        .historico { margin-top: 30px; }
        .historico h2 { font-size: 18px; border-bottom: 2px solid #bdc3c7; padding-bottom: 5px; margin-bottom: 10px; }
        .lista-links { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 10px; max-height: 300px; overflow-y: auto; }
        .item-link { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .item-link:last-child { border-bottom: none; }
        .links-acoes { margin-top: 6px; font-size: 11px; }
        .cliques { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Gerador de Ofertas</h1>
    
    <form id="formGerador">
        <div class="form-group">
            <label for="urlOriginal">Link de Afiliado (Mercado Livre/Amazon):</label>
            <input type="text" id="urlOriginal" placeholder="https://..." required>
        </div>
        
        <div class="form-group">
            <label for="descricao">Descrição Curta / Nome do Produto:</label>
            <input type="text" id="descricao" placeholder="Ex: iPhone 13 Black, Fritadeira Mondial" required>
        </div>

        <div class="form-group">
            <label for="precoAlvo">Preço Opcional (Ex: R$ 99,90):</label>
            <input type="text" id="precoAlvo" placeholder="Deixe em branco se não quiser pôr">
        </div>
        
        <button type="submit" id="btnGerar">Gerar Link Rastreado</button>
    </form>

    <div class="resultado" id="blocoResultado">
        <p>🎉 Seu link está pronto para disparar nos grupos!</p>
        <input type="text" id="linkCurtoGerado" readonly onclick="this.select()">
    </div>

    <div class="historico">
        <h2>📊 Cliques em Tempo Real</h2>
        <div class="lista-links" id="listaHistorico">
            <p style="text-align: center; color: #7f8c8d;">Nenhuma oferta registrada ainda.</p>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('formGerador');
    const btnGerar = document.getElementById('btnGerar');
    const blocoResultado = document.getElementById('blocoResultado');
    const linkCurtoGerado = document.getElementById('linkCurtoGerado');
    const listaHistorico = document.getElementById('listaHistorico');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('🚀 Aplicativo pronto!'))
                .catch(err => console.error(err));
        });
    }

    async function carregarHistorico() {
        try {
            const resposta = await fetch('/api/links');
            if (resposta.ok) {
                const links = await resposta.json();
                if (links.length > 0) {
                    listaHistorico.innerHTML = links.map(l => {
                        // Caso seja um link antigo sem a propriedade linkCurto salva, gera uma base para não quebrar
                        const exibicaoLinkCurto = l.linkCurto || `https://alvo-certo-app.onrender.com/clique/${l.idCurto}`;
                        
                        return `
                        <div class="item-link">
                            <div style="max-width: 75%;">
                                <span style="color: #2c3e50; font-weight: bold; display: block; word-wrap: break-word;">${l.descricao || l.categoria || 'Produto'}</span> 
                                <div class="links-acoes">
                                    <a href="${l.urlOriginal}" target="_blank" style="color: #2980b9; text-decoration: none; margin-right: 12px;">Original 🔗</a>
                                    <a href="${exibicaoLinkCurto}" target="_blank" style="color: #27ae60; text-decoration: none; font-weight: bold;">Encurtado 🟢</a>
                                </div>
                            </div>
                            <span class="cliques">${l.cliques || 0} cliques</span>
                        </div>
                    `}).join('');
                }
            }
        } catch (error) {
            console.error("Erro ao carregar histórico:", error);
        }
    }

    carregarHistorico();

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btnGerar.innerText = "Gerando Link...";
        btnGerar.disabled = true;

        const urlOriginal = document.getElementById('urlOriginal').value;
        const descricao = document.getElementById('descricao').value;
        const precoAlvo = document.getElementById('precoAlvo').value;

        try {
            const resposta = await fetch('/api/encurtar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urlOriginal, descricao, precoAlvo })
            });

            const dados = await resposta.json();

            if (resposta.ok && dados.linkCurto) {
                linkCurtoGerado.value = dados.linkCurto;
                blocoResultado.style.display = 'block';
                form.reset();
                carregarHistorico();
            } else {
                alert(dados.error || "Erro interno ao processar o link.");
            }
        } catch (error) {
            console.error(error);
            alert("Erro ao gerar o link. Verifique a conexão do servidor.");
        } finally {
            btnGerar.innerText = "Gerar Link Rastreado";
            btnGerar.disabled = false;
        }
    });
</script>
</body>
</html>
